<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Exam Review System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        .container { max-width: 400px; margin: auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer; width: 100%; }
        .error { color: red; margin-top: 10px; }
        .success { color: green; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Register</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Name:</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label>Role:</label>
                <select id="role">
                    <option value="STUDENT">Student</option>
                    <option value="EVALUATOR">Evaluator</option>
                    <option value="REVALUATOR">Revaluator</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>
            <div class="form-group" id="studentFields" style="display: none;">
                <label>USN:</label>
                <input type="text" id="usn">
                <label>Section:</label>
                <input type="text" id="section">
            </div>
            <button type="submit">Register</button>
        </form>
        <div id="message"></div>
        <p style="margin-top: 20px;">Already have an account? <a href="/login">Login here</a></p>
    </div>

    <script>
        document.getElementById('role').addEventListener('change', function() {
            const studentFields = document.getElementById('studentFields');
            studentFields.style.display = this.value === 'STUDENT' ? 'block' : 'none';
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            
            const requestBody = { name, email, password, role };
            
            if (role === 'STUDENT') {
                requestBody.usn = document.getElementById('usn').value;
                requestBody.section = document.getElementById('section').value;
            }
            
            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('message').innerHTML = `<div class="success">${data.message}</div>`;
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    document.getElementById('message').innerHTML = `<div class="error">${data.error}</div>`;
                }
            } catch (error) {
                document.getElementById('message').innerHTML = `<div class="error">Registration failed</div>`;
            }
        });
    </script>
</body>
</html>
