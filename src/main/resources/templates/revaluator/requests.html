<!-- src/main/resources/templates/revaluator/requests.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Revaluator — Pending Requests</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f4f6f8; padding: 24px; }
        h2 { margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        th { background: #f9fafb; font-weight: 600; }
        .btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn-submit { background: #4f46e5; color: #fff; }
        input[type=number] { width: 80px; padding: 4px 8px; border: 1px solid #d1d5db; border-radius: 4px; }
        .empty { text-align: center; padding: 40px; color: #6b7280; }
    </style>
</head>
<body>
    <h2><i class="fas fa-clipboard-list"></i> Pending Revaluation Requests</h2>
    <table id="requestTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Student</th>
                <th>Script ID</th>
                <th>Status</th>
                <th>New Marks</th>
                <th>Comments</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="requestBody">
            <tr><td colspan="7" class="empty">Loading...</td></tr>
        </tbody>
    </table>

    <script>
        async function loadRequests() {
            const res = await fetch('/revaluator/requests');
            const data = await res.json();
            const tbody = document.getElementById('requestBody');
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty">No pending requests</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(r => `
                <tr>
                    <td>#${r.revaluationId}</td>
                    <td>${r.student?.name || 'N/A'}</td>
                    <td>#${r.answerScript?.scriptId || 'N/A'}</td>
                    <td>${r.revaluationStatus}</td>
                    <td><input type="number" id="marks-${r.revaluationId}" step="0.5" min="0" placeholder="marks"></td>
                    <td><input type="text" id="comments-${r.revaluationId}" placeholder="optional"></td>
                    <td>
                        <button class="btn btn-submit" onclick="submitMarks(${r.revaluationId})">
                            <i class="fas fa-paper-plane"></i> Submit
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function submitMarks(id) {
            const marks = document.getElementById(`marks-${id}`).value;
            const comments = document.getElementById(`comments-${id}`).value;
            if (!marks) { alert('Enter marks before submitting.'); return; }

            const res = await fetch(`/revaluator/requests/${id}/submit?marks=${marks}&comments=${encodeURIComponent(comments)}`, {
                method: 'PUT'
            });
            const result = await res.json();
            if (res.ok) {
                alert(`✅ ${result.message}`);
                loadRequests();
            } else {
                alert(`❌ ${result.message || 'Failed'}`);
            }
        }

        loadRequests();
    </script>
</body>
</html>
